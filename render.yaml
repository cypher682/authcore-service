services:
  - type: web
    name: authcore-service
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_TITLE
        value: authcore-service
      - key: APP_VERSION
        value: 1.0.0
      - key: RUN_MIGRATIONS_ON_START
        value: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: MFA_CHALLENGE_EXPIRE_MINUTES
        value: 5
      - key: JWT_ALGORITHM
        value: HS256
      - key: RATE_LIMIT_DEFAULT
        value: 100/minute
      - key: RATE_LIMIT_AUTH
        value: 10/minute
      - key: RATE_LIMIT_SENSITIVE
        value: 5/minute
      - key: MAX_CONCURRENT_SESSIONS
        value: 5
      - key: SESSION_EXPIRE_DAYS
        value: 30
      - key: MAX_FAILED_ATTEMPTS
        value: 5
      - key: LOCKOUT_TTL_SECONDS
        value: 900
      - key: APP_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM
        sync: false
      - key: HIBP_API_KEY
        sync: false
