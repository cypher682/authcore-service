name: AuthCore CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: authcore-service

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check app tests alembic

      - name: Check Black formatting
        run: black --check app tests alembic

  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: docker compose build app

      - name: Create CI environment file
        run: cp .env.example .env

      - name: Start dependencies
        run: docker compose up -d postgres redis

      - name: Run migrations
        run: docker compose run --rm app alembic upgrade head

      - name: Run tests
        run: docker compose run --rm -e COVERAGE_FILE=/tmp/.coverage app pytest --cov=app --cov-report=term-missing --cov-fail-under=80 -q

      - name: Stop services
        if: always()
        run: docker compose down -v

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build --target runtime -t $IMAGE_NAME:${{ github.sha }} .

  trivy:
    name: Trivy critical scan
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build scan image
        run: docker build --target runtime -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
